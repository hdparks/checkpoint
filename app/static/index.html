<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint - Daily Mood Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@telegram-apps/sdk"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #f5f5f5;
            --bg-card: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #eeeeee;
            --accent-color: #667eea;
            --accent-hover: #5568d3;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #707070;
            --border-color: #2a2a4a;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        header p {
            opacity: 0.9;
        }
        .header-content {
            flex: 1;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .card h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
            color: var(--text-primary);
        }
        .entries-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .entry {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: border-color 0.3s;
        }
        .entry:last-child { border-bottom: none; }
        .mood-emoji {
            font-size: 1.8rem;
        }
        .entry-content {
            flex: 1;
        }
        .entry-note {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .entry-time {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input[type="number"] {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-switch input {
            width: 20px;
            height: 20px;
        }
        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #5568d3;
        }
        .mood-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .mood-1 { background: #ffebee; color: #c62828; }
        .mood-2 { background: #fff3e0; color: #ef6c00; }
        .mood-3 { background: #fff8e1; color: #f9a825; }
        .mood-4 { background: #e8f5e9; color: #2e7d32; }
        .mood-5 { background: #e3f2fd; color: #1565c0; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #ff6b7a;
        }
        .export-btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .export-btns .btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        .insights-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }
        .insights-card h2 {
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        .insight-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .insight-row:last-child { border-bottom: none; }
        .insight-label { color: var(--text-secondary); }
        .insight-value { font-weight: 600; color: var(--text-primary); }
        .insight-best { color: #2e7d32; }
        .insight-worst { color: #c62828; }
        .user-filter {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .user-filter label {
            color: var(--text-secondary);
            font-weight: 500;
        }
        .user-filter select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Checkpoint</h1>
                <p>Daily mood tracking made simple</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
        </header>

        <div class="user-filter">
            <label for="userSelect">Filter by User:</label>
            <select id="userSelect" onchange="filterByUser(this.value)">
                <option value="">All Users</option>
            </select>
            <span id="currentUserLabel" style="color: var(--text-muted); font-size: 0.9rem;"></span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Check-ins</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Average Mood</h3>
                <div class="value" id="avgMood">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Check-ins</h3>
                <div class="value" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Current Streak</h3>
                <div class="value" id="streak">0</div>
            </div>
        </div>

        <div class="insights-card">
            <h2>Insights</h2>
            <div id="insightsContent">
                <div class="empty-state">No data yet</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2>Mood Distribution</h2>
                <canvas id="distributionChart" height="200"></canvas>
            </div>
            <div class="card" id="settingsSection">
                <h2>Settings</h2>
                <div class="settings-form">
                    <div class="toggle-switch">
                        <input type="checkbox" id="pingEnabled" checked>
                        <label for="pingEnabled">Enable Random Pings</label>
                    </div>
                    <div class="form-group">
                        <label>Min Interval (minutes)</label>
                        <input type="number" id="minInterval" value="30" min="1">
                    </div>
                    <div class="form-group">
                        <label>Max Interval (minutes)</label>
                        <input type="number" id="maxInterval" value="120" min="1">
                    </div>
                    <div class="form-group">
                        <label>Ping Start Hour (0-23, leave empty for any)</label>
                        <input type="number" id="pingStartHour" min="0" max="23" placeholder="e.g. 8">
                    </div>
                    <div class="form-group">
                        <label>Ping End Hour (0-23, leave empty for any)</label>
                        <input type="number" id="pingEndHour" min="0" max="23" placeholder="e.g. 22">
                    </div>
                    <div class="form-group">
                        <label>Timezone Offset (hours from UTC, e.g., -5, 0, 8)</label>
                        <input type="number" id="timezoneOffset" placeholder="e.g. -5">
                    </div>
                    <button class="btn" onclick="saveSettings()">Save Settings</button>
                    <div class="export-btns">
                        <a href="/api/export/csv" class="btn" target="_blank">Export CSV</a>
                        <button class="btn" onclick="exportJSON()">Export JSON</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 30px;">
            <h2>Mood Over Time</h2>
            <canvas id="moodChart" height="100"></canvas>
        </div>

        <div class="card">
            <h2>Recent Entries</h2>
            <div class="entries-list" id="entriesList">
                <div class="empty-state">No entries yet</div>
            </div>
        </div>
    </div>

    <script>
        const MOOD_EMOJIS = {1: '😢', 2: '😕', 3: '😐', 4: '🙂', 5: '😄'};
        let chart = null;
        let userTimezoneOffset = 0;

        function toLocalTime(utcDate) {
            const date = new Date(utcDate);
            date.setHours(date.getHours() + userTimezoneOffset);
            return date;
        }

        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.querySelector('.theme-toggle').textContent = '☀️';
            }
        }

        async function loadInsights() {
            const url = selectedUserId ? `/api/stats/insights?telegram_id=${selectedUserId}` : '/api/stats/insights';
            const res = await fetch(url);
            const data = await res.json();

            const container = document.getElementById('insightsContent');
            if (!data.best_day) {
                container.innerHTML = '<div class="empty-state">No data yet</div>';
                return;
            }

            container.innerHTML = `
                <div class="insight-row">
                    <span class="insight-label">Best Day</span>
                    <span class="insight-value insight-best">${data.best_day} (${data.avg_by_day[data.best_day]})</span>
                </div>
                <div class="insight-row">
                    <span class="insight-label">Worst Day</span>
                    <span class="insight-value insight-worst">${data.worst_day} (${data.avg_by_day[data.worst_day]})</span>
                </div>
            `;
        }

        async function loadDistribution() {
            const url = selectedUserId ? `/api/stats/distribution?telegram_id=${selectedUserId}` : '/api/stats/distribution';
            const res = await fetch(url);
            const data = await res.json();

            const ctx = document.getElementById('distributionChart').getContext('2d');
            const counts = [data["1"] || 0, data["2"] || 0, data["3"] || 0, data["4"] || 0, data["5"] || 0];

            if (window.distChart) window.distChart.destroy();

            window.distChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['1 - Sad', '2 - Down', '3 - Okay', '4 - Good', '5 - Happy'],
                    datasets: [{
                        data: counts,
                        backgroundColor: ['#ffcdd2', '#ffe0b2', '#fff9c4', '#c8e6c9', '#bbdefb'],
                        borderColor: ['#c62828', '#ef6c00', '#f9a825', '#2e7d32', '#1565c0'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '50%',
                    radius: '50%',
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        async function exportJSON() {
            const res = await fetch('/api/export');
            const data = await res.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mood_data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const toggle = document.querySelector('.theme-toggle');
            if (current === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                toggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggle.textContent = '☀️';
            }
            updateChartColors();
        }

        function getChartColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return {
                border: isDark ? '#667eea' : '#667eea',
                bg: isDark ? 'rgba(102, 126, 234, 0.2)' : 'rgba(102, 126, 234, 0.1)',
                text: isDark ? '#e0e0e0' : '#333'
            };
        }

        function updateChartColors() {
            const entries = document.querySelectorAll('.entry');
            if (entries.length > 0) loadEntries();
        }

        async function loadStats(url) {
            if (!url) {
                url = selectedUserId ? `/api/stats?telegram_id=${selectedUserId}` : '/api/stats';
            }
            const res = await fetch(url);
            const stats = await res.json();
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('avgMood').textContent = stats.avg_mood;
            document.getElementById('todayCount').textContent = stats.today;
            document.getElementById('streak').textContent = stats.streak;
        }

        let telegramId = null;
        let selectedUserId = null;

        function getTelegramUser() {
            if (window.Telegram && window.Telegram.WebApp) {
                const webApp = window.Telegram.WebApp;
                webApp.ready();
                if (webApp.initDataUnsafe && webApp.initDataUnsafe.user) {
                    return webApp.initDataUnsafe.user.id;
                }
            }
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('telegram_id') ? parseInt(urlParams.get('telegram_id')) : null;
        }

        async function loadUsers() {
            const res = await fetch('/api/users');
            const users = await res.json();

            const select = document.getElementById('userSelect');
            users.forEach(user => {
                const option = document.createElement('option');
                option.value = user.telegram_id;
                option.textContent = `User ${user.telegram_id} (${user.entry_count} entries)`;
                select.appendChild(option);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const filterId = urlParams.get('filter_user');
            if (filterId) {
                select.value = filterId;
                filterByUser(filterId);
            }
        }

        function filterByUser(userId) {
            selectedUserId = userId || null;
            const url = selectedUserId 
                ? `/api/stats?telegram_id=${selectedUserId}` 
                : '/api/stats';
            loadStats(url);
            loadEntries();
            loadDistribution();
            loadInsights();

            const label = document.getElementById('currentUserLabel');
            label.textContent = selectedUserId ? `Viewing User ${selectedUserId}` : '';
        }

        telegramId = getTelegramUser();

        async function loadSettings() {
            const section = document.getElementById('settingsSection');
            if (!telegramId) {
                section.innerHTML = `
                    <h2>Settings</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 15px;">
                        Open this app from Telegram to view and edit your personal settings.
                    </p>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">
                        Each user has their own settings including ping intervals, time preferences, and timezone.
                    </p>
                `;
                return;
            }
            const res = await fetch(`/api/settings?telegram_id=${telegramId}`);
            const settings = await res.json();
            document.getElementById('pingEnabled').checked = settings.ping_enabled;
            document.getElementById('minInterval').value = settings.min_interval_minutes;
            document.getElementById('maxInterval').value = settings.max_interval_minutes;
            document.getElementById('pingStartHour').value = settings.ping_start_hour ?? '';
            document.getElementById('pingEndHour').value = settings.ping_end_hour ?? '';
            document.getElementById('timezoneOffset').value = settings.timezone_offset ?? '';
            userTimezoneOffset = settings.timezone_offset ?? 0;
        }

        async function saveSettings() {
            if (!telegramId) {
                alert('Please open this app from Telegram to save settings.');
                return;
            }
            const startHour = document.getElementById('pingStartHour').value;
            const endHour = document.getElementById('pingEndHour').value;
            const tzOffset = document.getElementById('timezoneOffset').value;
            const data = {
                telegram_id: telegramId,
                ping_enabled: document.getElementById('pingEnabled').checked,
                min_interval_minutes: parseInt(document.getElementById('minInterval').value),
                max_interval_minutes: parseInt(document.getElementById('maxInterval').value),
                ping_start_hour: startHour ? parseInt(startHour) : null,
                ping_end_hour: endHour ? parseInt(endHour) : null,
                timezone_offset: tzOffset ? parseInt(tzOffset) : 0
            };
            await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('Settings saved!');
        }

        async function loadEntries() {
            const filterId = selectedUserId || telegramId;
            const url = filterId ? `/api/entries?telegram_id=${filterId}` : '/api/entries';
            const res = await fetch(url);
            const entries = await res.json();

            const list = document.getElementById('entriesList');
            if (entries.length === 0) {
                list.innerHTML = '<div class="empty-state">No entries yet</div>';
                return;
            }

            list.innerHTML = entries.map(e => `
                <div class="entry">
                    <span class="mood-emoji">${MOOD_EMOJIS[e.mood]}</span>
                    <div class="entry-content">
                        <div><span class="mood-badge mood-${e.mood}">${e.mood}/5</span></div>
                        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
                    </div>
                    <div class="entry-time">${toLocalTime(e.created_at).toLocaleString()}</div>
                    <button class="delete-btn" onclick="deleteEntry(${e.id})">Delete</button>
                </div>
            `).join('');

            updateChart(entries);
        }

        async function deleteEntry(id) {
            if (!confirm('Delete this entry?')) return;
            await fetch('/api/entries/' + id, { method: 'DELETE' });
            loadEntries();
            loadStats();
        }

        function updateChart(entries) {
            const sorted = [...entries].reverse().slice(-30);
            if (sorted.length === 0) return;

            const HOUR_MS = 60 * 60 * 1000;

            const segments = [];
            let currentSegment = [];

            for (let i = 0; i < sorted.length; i++) {
                const entry = sorted[i];
                const currentTime = toLocalTime(entry.created_at).getTime();

                if (i === 0) {
                    currentSegment.push({ x: currentTime, y: entry.mood });
                } else {
                    const prevTime = toLocalTime(sorted[i - 1].created_at).getTime();
                    if (currentTime - prevTime > HOUR_MS) {
                        segments.push(currentSegment);
                        currentSegment = [];
                    }
                    currentSegment.push({ x: currentTime, y: entry.mood });
                }
            }
            if (currentSegment.length > 0) segments.push(currentSegment);

            if (chart) chart.destroy();

            const ctx = document.getElementById('moodChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: segments.map(seg => ({
                        label: 'Mood',
                        data: seg,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        stepped: 'after'
                    }))
                },
                options: {
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: {
                                    day: 'MMM d',
                                    hour: 'MMM d HH:mm'
                                }
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 0
                            }
                        },
                        y: { min: 0, max: 5, ticks: { stepSize: 1 } }
                    }
                }
            });
        }

        loadStats();
        loadUsers();
        loadSettings();
        loadEntries();
        loadInsights();
        loadDistribution();
        initTheme();
        setInterval(() => { loadStats(); loadEntries(); loadInsights(); loadDistribution(); }, 30000);
    </script>
</body>
</html>
