<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint - Daily Mood Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        header p {
            opacity: 0.9;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .entries-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .entry {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .entry:last-child { border-bottom: none; }
        .mood-emoji {
            font-size: 1.8rem;
        }
        .entry-content {
            flex: 1;
        }
        .entry-note {
            color: #666;
            font-size: 0.9rem;
        }
        .entry-time {
            color: #999;
            font-size: 0.8rem;
        }
        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 500;
            color: #555;
        }
        .form-group input[type="number"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toggle-switch input {
            width: 20px;
            height: 20px;
        }
        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #5568d3;
        }
        .mood-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .mood-1 { background: #ffebee; color: #c62828; }
        .mood-2 { background: #fff3e0; color: #ef6c00; }
        .mood-3 { background: #fff8e1; color: #f9a825; }
        .mood-4 { background: #e8f5e9; color: #2e7d32; }
        .mood-5 { background: #e3f2fd; color: #1565c0; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Checkpoint</h1>
            <p>Daily mood tracking made simple</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Check-ins</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Average Mood</h3>
                <div class="value" id="avgMood">0</div>
            </div>
            <div class="stat-card">
                <h3>Today's Check-ins</h3>
                <div class="value" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Current Streak</h3>
                <div class="value" id="streak">0</div>
            </div>
        </div>
        
        <div class="grid-2">
            <div class="card">
                <h2>Mood Over Time</h2>
                <canvas id="moodChart" height="200"></canvas>
            </div>
            <div class="card">
                <h2>Settings</h2>
                <div class="settings-form">
                    <div class="toggle-switch">
                        <input type="checkbox" id="pingEnabled" checked>
                        <label for="pingEnabled">Enable Random Pings</label>
                    </div>
                    <div class="form-group">
                        <label>Min Interval (hours)</label>
                        <input type="number" id="minInterval" value="1" min="1" max="24">
                    </div>
                    <div class="form-group">
                        <label>Max Interval (hours)</label>
                        <input type="number" id="maxInterval" value="3" min="1" max="24">
                    </div>
                    <div class="form-group">
                        <label>Ping Start Hour (0-23, leave empty for any)</label>
                        <input type="number" id="pingStartHour" min="0" max="23" placeholder="e.g. 8">
                    </div>
                    <div class="form-group">
                        <label>Ping End Hour (0-23, leave empty for any)</label>
                        <input type="number" id="pingEndHour" min="0" max="23" placeholder="e.g. 22">
                    </div>
                    <button class="btn" onclick="saveSettings()">Save Settings</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>Recent Entries</h2>
            <div class="entries-list" id="entriesList">
                <div class="empty-state">No entries yet</div>
            </div>
        </div>
    </div>
    
    <script>
        const MOOD_EMOJIS = {1: '😢', 2: '😕', 3: '😐', 4: '🙂', 5: '😄'};
        let chart = null;
        
        async function loadStats() {
            const res = await fetch('/api/stats');
            const stats = await res.json();
            document.getElementById('totalCount').textContent = stats.total;
            document.getElementById('avgMood').textContent = stats.avg_mood;
            document.getElementById('todayCount').textContent = stats.today;
            document.getElementById('streak').textContent = stats.streak;
        }
        
        async function loadSettings() {
            const res = await fetch('/api/settings');
            const settings = await res.json();
            document.getElementById('pingEnabled').checked = settings.ping_enabled;
            document.getElementById('minInterval').value = settings.min_interval_hours;
            document.getElementById('maxInterval').value = settings.max_interval_hours;
            document.getElementById('pingStartHour').value = settings.ping_start_hour ?? '';
            document.getElementById('pingEndHour').value = settings.ping_end_hour ?? '';
        }
        
        async function saveSettings() {
            const startHour = document.getElementById('pingStartHour').value;
            const endHour = document.getElementById('pingEndHour').value;
            const data = {
                ping_enabled: document.getElementById('pingEnabled').checked,
                min_interval_hours: parseInt(document.getElementById('minInterval').value),
                max_interval_hours: parseInt(document.getElementById('maxInterval').value),
                ping_start_hour: startHour ? parseInt(startHour) : null,
                ping_end_hour: endHour ? parseInt(endHour) : null
            };
            await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('Settings saved!');
        }
        
        async function loadEntries() {
            const res = await fetch('/api/entries');
            const entries = await res.json();
            
            const list = document.getElementById('entriesList');
            if (entries.length === 0) {
                list.innerHTML = '<div class="empty-state">No entries yet</div>';
                return;
            }
            
            list.innerHTML = entries.map(e => `
                <div class="entry">
                    <span class="mood-emoji">${MOOD_EMOJIS[e.mood]}</span>
                    <div class="entry-content">
                        <div><span class="mood-badge mood-${e.mood}">${e.mood}/5</span></div>
                        ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
                    </div>
                    <div class="entry-time">${new Date(e.created_at).toLocaleString()}</div>
                </div>
            `).join('');
            
            updateChart(entries);
        }
        
        function updateChart(entries) {
            const sorted = [...entries].reverse().slice(-30);
            const labels = sorted.map(e => new Date(e.created_at).toLocaleDateString());
            const moods = sorted.map(e => e.mood);
            
            if (chart) chart.destroy();
            
            const ctx = document.getElementById('moodChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Mood',
                        data: moods,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    scales: {
                        y: { min: 0, max: 5, ticks: { stepSize: 1 } }
                    }
                }
            });
        }
        
        loadStats();
        loadSettings();
        loadEntries();
        setInterval(() => { loadStats(); loadEntries(); }, 30000);
    </script>
</body>
</html>
